name: Feature request
description: Suggest a workflow, command, validator, renderer, or protocol improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: need
    attributes:
      label: Scientific figure need
      description: What figure workflow or integrity problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the skill, command, validator, or metadata change.
    validations:
      required: true
  - type: textarea
    id: safeguards
    attributes:
      label: Integrity safeguards
      description: How should truth, reproducibility, accessibility, journal status, and provenance be protected?
