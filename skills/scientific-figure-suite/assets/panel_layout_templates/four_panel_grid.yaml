layout_name: four_panel_grid
status: template
layout_engine: audited_grid
manual_axes_fallback: true
canvas:
  width_mm: 180
  height_mm: 130
grid:
  rows: 2
  columns: 2
panels:
  - id: a
    role: primary
    bbox: {x0: 0.08, y0: 0.56, width: 0.38, height: 0.34}
  - id: b
    role: diagnostic
    bbox: {x0: 0.55, y0: 0.56, width: 0.38, height: 0.34}
  - id: c
    role: comparator
    bbox: {x0: 0.08, y0: 0.12, width: 0.38, height: 0.34}
  - id: d
    role: summary
    bbox: {x0: 0.55, y0: 0.12, width: 0.38, height: 0.34}
legend:
  placement: bottom
  shared: true
layout_quality:
  require_same_row_top_bottom_alignment: true
  colorbar_requires_explicit_bbox: true
  semantic_colors_global: true
  direct_labels_controlled_only: true
